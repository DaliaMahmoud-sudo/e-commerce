<section class="py-8">
  <div class="container mx-auto px-4">

    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-2">
        <div class="w-1.5 h-8 bg-emerald-700 rounded-full"></div>
        <h2 class="text-2xl font-bold text-gray-800">
          Shop By <span class="text-emerald-600">Category</span>
        </h2>
      </div>
      <a routerLink="/categories" class="flex items-center gap-1 text-emerald-600 font-semibold hover:underline">
        View All Categories
        <i class="fa-solid fa-arrow-right text-sm"></i>
      </a>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6">
      @for (cat of categoryList(); track cat._id) {
        <div class="group cursor-pointer">
          <div class="bg-white border border-gray-100 rounded-xl p-6 shadow-sm hover:shadow-md transition-all duration-300 flex flex-col items-center justify-center gap-4">

            <div class="w-24 h-24 rounded-full overflow-hidden bg-gray-50 flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
              <img
                [src]="cat.image"
                [alt]="cat.name"
                class="w-full h-full object-contain p-2"
              />
            </div>

            <h3 class="text-sm font-bold text-gray-700 group-hover:text-emerald-600 transition-colors">
              {{ cat.name }}
            </h3>
          </div>
        </div>
      }
    </div>

  </div>
</section>
