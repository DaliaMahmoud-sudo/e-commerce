<section class="py-8">
  <div class="container mx-auto px-4">

    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-2">
        <div class="w-1.5 h-8 bg-emerald-700 rounded-full"></div>
        <h2 class="text-2xl font-bold text-gray-800">
          Shop By <span class="text-emerald-600">Category</span>
        </h2>
      </div>
    </div>
    <div class="mt-5 grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
       @for (product of productList() | paginate: { id: 'foo',
                                                      itemsPerPage: pageSize(),
                                                      currentPage: p(),
                                                      totalItems: total() } ; track product._id) {
        <app-card [product]="product"></app-card>
       }


    </div>

    <pagination-controls  id="foo"
                      (pageChange)="pageChanged($event)"
                      [maxSize]="9"
                      [directionLinks]="true"
                      [autoHide]="true"
                      [responsive]="true"
                      previousLabel="Previous"
                      nextLabel="Next"
                      screenReaderPaginationLabel="Pagination"
                      screenReaderPageLabel="page"
                      screenReaderCurrentLabel="You're on page">
</pagination-controls>

  </div>

</section>
